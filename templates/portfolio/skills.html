{% extends 'base.html' %}
{% block title %}Skills{% endblock %}
{% block content %}

<h1>My Skills</h1>

<div class="skills-grid">
    {% for skill in skills %}
    <div class="skill-card">
        <div class="skill-card-header">
            <h3>{{ skill.name }}</h3>
            <span class="skill-level level-{{ skill.level|lower }}">{{ skill.level }}</span>
        </div>
        <p>{{ skill.description }}</p>
    </div>
    {% empty %}
    <p>No skills available at the moment.</p>
    {% endfor %}
</div>

{% endblock %}
