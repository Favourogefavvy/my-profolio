{% extends 'base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}

<h1>{{ post.title }}</h1>

<p>By {{ blog.author }}</p>

{% if blog.image %}
    <img src="{{ blog.image.url }}" width="300">
{% endif %}

<p>{{ blog.content }}</p>
<a href="{% url 'blog_update' blog.pk %}">Edit Post</a>

<a href="{% url 'blog_delete' blog.pk %}">Delete Post</a>

<a href="{% url 'blog_list' %}">Back to Blog</a>

{% endblock %}
