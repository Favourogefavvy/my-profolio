{% extends 'base.html' %}

{% block title %}{{ blog.title }}{% endblock %}

{% block content %}

<div class="card">
    <h1 class="section-title">{{ blog.title }}</h1>
    <p class="blog-meta">By {{ blog.author }}</p>

    {% if blog.image %}
        <img src="{{ blog.image.url }}" alt="{{ blog.title }} image">
    {% endif %}

    <p>{{ blog.content }}</p>
    <div class="form-actions" style="margin-top: 1.75rem;">
        <a href="{% url 'blog_update' blog.pk %}" class="btn btn-primary">Edit Post</a>
        <a href="{% url 'blog_delete' blog.pk %}" class="btn btn-whatsapp">Delete Post</a>
        <a href="{% url 'blog_list' %}" class="btn">Back to Blog</a>
    </div>
</div>

{% endblock %}
